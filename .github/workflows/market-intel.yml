# Prediction-market odds snapshot (Polymarket + Kalshi) for the intel panel,
# every 3 hours post-WC (was hourly during the tournament; only thin NRL
# coverage remains). Read-only public APIs — no keys. Migrations are
# refresh.yml's job; this workflow assumes the schema is already at head.
name: market-intel

on:
  schedule:
    - cron: "23 */3 * * *"
  workflow_dispatch: {}

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Snapshot market odds
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PYTHONPATH: backend:.
        run: python -m pipeline.market_intel
