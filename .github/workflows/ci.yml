# CI: both test suites + typecheck + build must pass before merge to main.
name: ci

on:
  push:
    branches: [main, "feature/**"]
  pull_request: {}

jobs:
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Run pytest
        run: python -m pytest

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install deps
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Jest
        run: npm test
      - name: Build
        # The app guards against a missing API URL in production builds, so CI
        # must provide it (points at the real backend; no calls happen at build).
        env:
          NEXT_PUBLIC_API_URL: https://pitchprophet-api.onrender.com
        run: npm run build
      - name: Audit (informational)
        # Non-blocking: the remaining Next.js advisories are tracked as an
        # accepted risk in docs/POST-LAUNCH.md until the post-launch 15/16 upgrade.
        run: npm audit --omit=dev || true
