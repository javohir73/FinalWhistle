# Read-only evidence pull for the MANUAL shadow-promotion decision (FR-4.8):
# prints the production-vs-shadow record and the availability-twin record from
# the token-guarded internal endpoints, and evaluates the promotion gate
# (>=30 scored shadow pairs AND the twin ahead on avg log loss — see
# docs/RUNBOOK-WC26-ENDGAME.md) into the job summary. Writes nothing;
# NOTHING here auto-promotes. Same secrets as refresh-live / ops-flag-internal:
#   API_URL          e.g. https://pitchprophet-api.onrender.com
#   RECOMPUTE_TOKEN  same value as the backend's RECOMPUTE_TOKEN env var
name: shadow-record

on:
  workflow_dispatch: {}
  schedule:
    - cron: "30 7 * * *"  # daily, after the 06:00 UTC refresh has scored new pairs

jobs:
  readout:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install Python deps
        # Needed so the availability gate below can import pipeline.run_availability_benchmark
        # (pulls in app.db/app.models/ml.* — same stack as ci.yml's python-tests job).
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: GET shadow-record + availability-record, evaluate the gate
        env:
          API_URL: ${{ secrets.API_URL }}
          RECOMPUTE_TOKEN: ${{ secrets.RECOMPUTE_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${API_URL:-}" ] || [ -z "${RECOMPUTE_TOKEN:-}" ]; then
            echo "API_URL / RECOMPUTE_TOKEN secrets not set — cannot call the API." >&2
            exit 1
          fi
          echo "== shadow-record (production vs odds-anchored twin, paired matches) =="
          SHADOW=$(curl -sfS -H "X-Recompute-Token: ${RECOMPUTE_TOKEN}" \
            "${API_URL}/api/internal/shadow-record")
          echo "$SHADOW" | jq .
          echo
          echo "== availability-record (availability twin vs published forecast) =="
          AVAIL=$(curl -sfS -H "X-Recompute-Token: ${RECOMPUTE_TOKEN}" \
            "${API_URL}/api/internal/availability-record")
          echo "$AVAIL" | jq .

          # Promotion gate (RUNBOOK-WC26-ENDGAME.md): >=30 scored shadow pairs
          # AND the odds-anchored twin ahead of production on avg log loss.
          N=$(echo "$SHADOW" | jq -r '.shadow.n')
          PROD_LL=$(echo "$SHADOW" | jq -r '.production.avg_log_loss')
          SHAD_LL=$(echo "$SHADOW" | jq -r '.shadow.avg_log_loss')
          STATUS="GATE NOT MET"
          DELTA="n/a"
          if [ "$PROD_LL" != "null" ] && [ "$SHAD_LL" != "null" ]; then
            DELTA=$(jq -n --argjson p "$PROD_LL" --argjson s "$SHAD_LL" '($p - $s) * 10000 | round / 10000')
            if [ "$N" -ge 30 ] && [ "$(jq -n --argjson p "$PROD_LL" --argjson s "$SHAD_LL" '$s < $p')" = "true" ]; then
              STATUS="GATE MET"
            fi
          fi
          {
            echo "## Odds-blend promotion gate"
            echo
            echo "**${STATUS}** — n=${N}/30, Δ avg log-loss (production − shadow) = ${DELTA}"
            echo
            echo "Gate: ≥30 scored shadow pairs AND the twin ahead on avg log loss (Δ > 0)."
            echo "When met, promotion stays MANUAL:"
            echo '`PYTHONPATH=backend:. .venv/bin/python -m pipeline.promote_blend --w-odds 0.35 --use-odds --ship` via PR (stop gate).'
          } >> "$GITHUB_STEP_SUMMARY"
          echo "${STATUS} — n=${N}/30, delta=${DELTA}"

          # Availability promotion gate (RUNBOOK-WC26-ENDGAME.md): machine-checked
          # via pipeline.run_availability_benchmark.availability_gate (tested Python,
          # not jq) — n >= 20 scored pairs AND diff_ci95 upper bound < 0.
          echo "$AVAIL" > /tmp/availability_record.json
          cat > /tmp/availability_gate.py <<'PYEOF'
          import json
          from pipeline.run_availability_benchmark import availability_gate
          rec = json.load(open('/tmp/availability_record.json'))
          print(json.dumps(availability_gate(rec)))
          PYEOF
          AVAIL_GATE=$(PYTHONPATH=backend:. python /tmp/availability_gate.py)
          echo "$AVAIL_GATE" | jq .
          AVAIL_MET=$(echo "$AVAIL_GATE" | jq -r '.met')
          AVAIL_N=$(echo "$AVAIL_GATE" | jq -r '.n')
          AVAIL_MIN_N=$(echo "$AVAIL_GATE" | jq -r '.min_n')
          AVAIL_DELTA=$(echo "$AVAIL_GATE" | jq -r '.delta_log_loss')
          AVAIL_REASON=$(echo "$AVAIL_GATE" | jq -r '.reason')
          AVAIL_STATUS="GATE NOT MET"
          if [ "$AVAIL_MET" = "true" ]; then
            AVAIL_STATUS="GATE MET"
          fi
          {
            echo "## Availability promotion gate"
            echo
            echo "**${AVAIL_STATUS}** — n=${AVAIL_N}/${AVAIL_MIN_N}, Δ log-loss (availability − production) = ${AVAIL_DELTA}"
            echo
            echo "Gate: n >= ${AVAIL_MIN_N} scored pairs AND diff_ci95 upper bound < 0. Reason: ${AVAIL_REASON}."
            if [ "$AVAIL_MET" = "true" ]; then
              echo
              echo "Promotion stays MANUAL:"
              echo '`PYTHONPATH=backend:. python -m pipeline.promote_blend --use-availability --ship` via PR (stop gate).'
            fi
          } >> "$GITHUB_STEP_SUMMARY"
          echo "${AVAIL_STATUS} — n=${AVAIL_N}/${AVAIL_MIN_N}, delta=${AVAIL_DELTA}, reason=${AVAIL_REASON}"
