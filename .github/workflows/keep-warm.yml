# Keep the free Render web service warm to avoid ~20s cold starts.
# Render's free tier spins the service down after ~15 min idle; this pings the
# health endpoint every ~10 min so first-load users hit a warm instance.
#
# Note: GitHub's scheduler can delay sub-hourly crons under load. For rock-solid
# 1-minute pings, point a free cron-job.org job at the same URL instead.
name: keep-warm

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API health
        run: curl -fsS -m 30 https://pitchprophet-api.onrender.com/api/health || true
