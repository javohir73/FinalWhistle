# Migrate + refresh the production database (free alternative to a Render cron).
# Runs the FULL pipeline: apply migrations -> ingest results -> Elo -> stats ->
# predictions, directly against the Render Postgres.
#
# Setup (one time):
#   1. In Render, open the pitchprophet-db database and copy the EXTERNAL
#      connection string (Info tab → "External Database URL").
#   2. In GitHub: repo → Settings → Secrets and variables → Actions → New secret
#      named DATABASE_URL with that value.
#   3. Run this workflow once via "Run workflow" to seed the database.
# It then runs daily at 06:00 UTC.
name: refresh-data

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch: {}

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Apply migrations
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: alembic upgrade head
      - name: Run full pipeline (ingest → Elo → predictions)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PYTHONPATH: backend:.
          API_FOOTBALL_API_KEY: ${{ secrets.API_FOOTBALL_API_KEY }}
        run: python -m pipeline.run_pipeline
