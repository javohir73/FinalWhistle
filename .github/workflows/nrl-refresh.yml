# NRL data refresh: ingest results/fixtures from fixturedownload, then write
# frozen shadow predictions and grade finished matches — against the Render
# Postgres, via the same DATABASE_URL secret refresh.yml uses.
#
# Cadence: NRL rounds run Thu-Sun AEST; the Mon/Fri 18:00 UTC crons ingest
# completed rounds promptly and freeze predictions well before the next round.
# Manual "Run workflow" covers the one-off backfill and ad-hoc reruns.
# Deliberately separate from the football daily pipeline (runbook §1).
# Also refreshes State of Origin (sport="origin") — cheap no-ops outside May-July.
name: nrl-refresh

on:
  schedule:
    - cron: "0 18 * * 1"
    - cron: "0 18 * * 5"
    - cron: "0 8 * * 2"   # Tue ~18:00 AEST -- after the round's team-list announcement
  workflow_dispatch: {}

# Never run two refreshes concurrently: overlapping runs race on
# prob_snapshots and nrl_match_stats unique keys (seen 2026-07-10 when a
# scheduled run landed inside a 21-min manual backfill run). Queue instead.
concurrency:
  group: nrl-refresh
  cancel-in-progress: false

jobs:
  nrl-refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Apply migrations
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: alembic upgrade head
      - name: Ingest NRL seasons (idempotent)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PYTHONPATH: backend:.
        run: python -m pipeline.sports.nrl_ingest --seasons 2017 2026
      - name: Ingest NRL team stats + try events (idempotent, resumable)
        # Stats are an additive layer -- a failure here must not block the
        # core predict/grade/projections steps below.
        continue-on-error: true
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PYTHONPATH: backend:.
        run: python -m pipeline.sports.nrl_stats --seasons 2024 2026
      - name: Generate frozen shadow predictions + grade finished matches
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PYTHONPATH: backend:.
        run: python -m pipeline.sports.nrl_predict --generate --grade
      - name: Compute finals projections (Monte Carlo)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PYTHONPATH: backend:.
        run: python -m pipeline.sports.nrl_projections
      - name: Ingest NRL team lists (idempotent; late-change flagged)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PYTHONPATH: backend:.
        run: python -m pipeline.sports.nrl_team_lists --season 2026
      - name: Ingest State of Origin (seed + live seasons, idempotent)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PYTHONPATH: backend:.
        run: python -m pipeline.sports.origin_ingest --seed --seasons 2025 2027
      - name: Origin frozen shadow predictions + grading
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PYTHONPATH: backend:.
        run: python -m pipeline.sports.origin_predict --generate --grade
