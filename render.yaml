# Render Blueprint (FREE tier) — backend API + Postgres.
# Migrations + daily data refresh run via GitHub Actions (.github/workflows/refresh.yml),
# because Render's free tier doesn't allow pre-deploy commands or cron jobs.
# Frontend is deployed separately on Vercel (see DEPLOYMENT.md).
databases:
  # NOTE: pitchprophet-* service/DB names are legacy but load-bearing — they map
  # to live Render resources and the production API host. Do not rename.
  - name: pitchprophet-db
    plan: free # free Postgres (expires after ~90 days; upgrade for production)

services:
  # ---- Backend API (FastAPI in Docker) ----
  - type: web
    name: pitchprophet-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pitchprophet-db
          property: connectionString
      - key: RECOMPUTE_TOKEN
        generateValue: true # Render generates a strong secret
      - key: MODEL_VERSION
        value: poisson-elo-v0.1
      - key: CACHE_TTL_SECONDS
        value: "600"
      - key: ENVIRONMENT
        value: production
      - key: CORS_ORIGINS
        sync: false # set to your Vercel URL after the frontend deploys (also gates the Origin/CSRF check; www/apex sibling auto-allowed)
      - key: CORS_PREVIEW_REGEX
        sync: false # leave BLANK in prod (a loose *.vercel.app pattern is a CSRF hole); anchored project regex only, ideally on a non-prod service
      - key: PUBLIC_BASE_URL
        sync: false # base URL for links in emails (reset/verify); must be an allowed origin, e.g. your Vercel URL
      - key: EMAIL_PROVIDER
        value: console # "console" logs links (no send); set "resend" + EMAIL_API_KEY to send real email
      - key: EMAIL_API_KEY
        sync: false # provider secret (e.g. Resend); empty => safe console fallback
      - key: EMAIL_FROM
        sync: false # From identity, e.g. "FinalWhistle <noreply@yourdomain>" (verify the domain with the provider)
      - key: SENTRY_DSN
        sync: false # optional: paste a Sentry DSN to enable backend error tracking
      - key: COOKIE_SECURE
        value: "true" # session cookie Secure flag (true in prod over https)
      - key: FOOTBALL_DATA_API_KEY
        sync: false # set near kickoff to enable live in-game scores
      - key: LIVE_MODE_ENABLED
        value: "false" # flip to "true" (with a key set) to activate live updates
