<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f6f8f3" />
    <title>FinalWhistle — You're offline</title>
    <style>
      /* Self-contained on purpose: this page must render with zero network and
         zero cached build assets. Colors mirror the Daylight app theme (#f6f8f3). */
      :root {
        --bg: #f6f8f3;
        --fg: #11271b;
        --muted: #5e6f63;
        --win: #8fd633;
        --border: rgba(17, 39, 27, 0.1);
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { height: 100%; }
      body {
        display: grid;
        place-items: center;
        background: var(--bg);
        color: var(--fg);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        padding: 24px;
        padding-bottom: calc(24px + env(safe-area-inset-bottom));
        text-align: center;
      }
      main { max-width: 26rem; }
      .badge {
        display: inline-grid;
        place-items: center;
        width: 72px;
        height: 72px;
        border-radius: 20px;
        background: rgba(143, 214, 51, 0.14);
        border: 1px solid rgba(143, 214, 51, 0.4);
        margin-bottom: 20px;
      }
      .badge img { width: 44px; height: 44px; border-radius: 10px; }
      h1 {
        font-size: 1.5rem;
        font-weight: 800;
        letter-spacing: -0.02em;
        margin-bottom: 10px;
      }
      p { font-size: 0.9rem; line-height: 1.55; color: var(--muted); }
      p + p { margin-top: 8px; }
      button {
        margin-top: 22px;
        padding: 10px 22px;
        font-size: 0.9rem;
        font-weight: 600;
        color: #123723;
        background: var(--win);
        border: none;
        border-radius: 10px;
        cursor: pointer;
      }
      button:active { opacity: 0.85; }
      .wordmark {
        margin-top: 28px;
        font-size: 0.75rem;
        font-weight: 700;
        color: var(--muted);
        letter-spacing: 0.02em;
      }
    </style>
  </head>
  <body>
    <main>
      <span class="badge"><img src="/icon-192.png" alt="" width="44" height="44" /></span>
      <h1>You're offline</h1>
      <p>FinalWhistle needs a connection for live scores, standings and AI forecasts — none of that is shown stale.</p>
      <p>Your bracket picks are saved on this device and will be right where you left them.</p>
      <button type="button" onclick="location.reload()">Try again</button>
      <div class="wordmark">FinalWhistle</div>
    </main>
  </body>
</html>
